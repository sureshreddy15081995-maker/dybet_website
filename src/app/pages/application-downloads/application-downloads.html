<section class="download-section" id="application">
    <div class="section-header">
        <h2 class="section-title">DOWNLOAD OUR APPLICATION</h2>
        <p class="section-subtitle">Get the latest version of our software for your preferred platform</p>
    </div>

    <div class="download-grid">
        <div class="download-card">
            <div class="platform-icon">
                <i class="fab fa-windows"></i>
            </div>
            <h3 class="platform-name">Windows</h3>
            <p class="platform-format">EXE Installer</p>
            <a (click)="onDownloadLinks('windows')" class="download-btn">
                <i class="fas fa-download"></i>
                Download
            </a>
            <!-- <p class="file-size">~85 MB</p> -->
        </div>

        <div class="download-card">
            <div class="platform-icon">
                <i class="fab fa-apple"></i>
            </div>
            <h3 class="platform-name">macOS</h3>
            <p class="platform-format">DMG Package</p>
            <a (click)="onDownloadLinks('macOs')" class="download-btn">
                <i class="fas fa-download"></i>
                Download
            </a>
            <!-- <p class="file-size">~92 MB</p> -->
        </div>

        <div class="download-card">
            <div class="platform-icon">
                <i class="fab fa-android"></i>
            </div>
            <h3 class="platform-name">Android</h3>
            <p class="platform-format">APK File</p>
            <a (click)="onDownloadLinks('android')" class="download-btn">
                <i class="fas fa-download"></i>
                Download
            </a>
            <!-- <p class="file-size">~45 MB</p> -->
        </div>

        <div class="download-card">
            <div class="platform-icon">
                <i class="fab fa-app-store-ios"></i>
            </div>
            <h3 class="platform-name">iOS</h3>
            <p class="platform-format">IPA File</p>
            <a (click)="onDownloadLinks('ios')" class="download-btn">
                <i class="fas fa-download"></i>
                Download
            </a>
            <!-- <p class="file-size">~78 MB</p> -->
        </div>
    </div>
</section>
