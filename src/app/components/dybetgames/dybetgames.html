<div class="casino-header">

  <h2>{{ TabName | titlecase | translate}}</h2>

  <div class="casino-filters">

    <!-- Provider Dropdown -->
    <div class="provider-wrapper" #dropdownContainer>

      <div class="provider-box" (click)="toggleDropdown($event)">

        <div class="selected-provider">
          {{ selectedProvider | translate}}
        </div>

        <div class="arrow-icon">
          <i class="fas" [ngClass]="showProviders ? 'fa-chevron-up' : 'fa-chevron-down'">
          </i>
        </div>

      </div>

      <div class="provider-list" *ngIf="showProviders">

        <div class="provider-item" *ngFor="let provider of providers" (click)="selectProvider(provider)"
          [class.active-provider]="provider.name === selectedProvider">

          {{ provider.name | translate}}
          <i class="fas fa-check active-icon" *ngIf="provider.name === selectedProvider"></i>
        </div>

      </div>

    </div>

    <!-- Search -->
    <input type="text" class="game-search" [placeholder]="'Search games...' | translate" [(ngModel)]="searchText"
      (input)="searchGames()" />

  </div>

</div>

<div class="provider-section">

  <div class="games-grid all-games-grid">

    <div class="game-card" (click)="launchGame(game)"  *ngFor="
          let game of dybetgames;
          trackBy: trackByGame
        ">
      <div class="game-image-wrapper">
        <!-- Skeleton Loader -->
        <div class="image-loader"></div>
        <img [src]="game.imageUrl" [alt]="game.gameName" loading="lazy" class="game-image" (load)="onImageLoad($event)">
      </div>
      <p>
        <img [src]="'../../assets/providerIicons/' + game.provider + '.png'" [alt]="game.provider"
          class="provider_icon"  loading="lazy" width="22px" height="22px"/>

        {{ game.gameName }}

      </p>
    </div>
  </div>
  <div class="no-games" *ngIf="dybetgames.length === 0">
    {{'No games found' | translate}}
  </div>
</div>
